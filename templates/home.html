{% extends 'base.html' %}

{% block content %}

<h1>Blog Posts</h1>

{% for post in posts %}
<div class="card">
    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>
    <small>By {{ post.author }}</small>

    {% if user == post.author %}
        <br><br>
        <a href="/edit/{{ post.id }}/">Edit</a>
        <a href="/delete/{{ post.id }}/">Delete</a>
    {% endif %}
</div>
{% endfor %}

{% endblock %}
